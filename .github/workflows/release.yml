name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build:packages && npm run prisma:generate --workspace @paykh/api && npm run build
      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          echo "## ${GITHUB_REF_NAME}" > notes.md
          if [ -n "$PREV" ]; then
            git log --pretty="- %s (%h)" "${PREV}..${GITHUB_REF_NAME}" >> notes.md
          else
            git log --pretty="- %s (%h)" >> notes.md
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          generate_release_notes: true
